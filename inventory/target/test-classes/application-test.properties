# Test Configuration
spring.application.name=inventory-service-test
server.port=0

# Kafka Configuration for Tests - using EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}

# Database Configuration (H2 for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Kafka auto-startup in tests
spring.kafka.consumer.auto-startup=false

# Logging Configuration
logging.level.com.factory.inventory=DEBUG
logging.level.org.springframework.kafka=WARN
